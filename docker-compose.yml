services:
  db:
    image: postgres:16-alpine
    container_name: agriconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriconnect
      POSTGRES_PASSWORD: agriconnect
      POSTGRES_DB: agriconnect
    ports:
      - "5544:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: agriconnect-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://agriconnect:agriconnect@db:5432/agriconnect
      JWT_SECRET: corwado-agriconnect-prod-secret-change-me
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
      SEED_ON_START: "true"
    ports:
      - "4010:4000"

  frontend:
    build: ./frontend
    container_name: agriconnect-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8090:80"

volumes:
  db_data:
